<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brat Anime Image Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>🎨 Brat Anime Image Generator</h1>
        <div class="subtitle">
            Mengubah teks menjadi gambar bergaya Brat Anime
        </div>


    <style>
        /* Style untuk Tombol WhatsApp */
        .wa-button {
            display: inline-flex;
            align-items: center;
            background-color: #25D366; /* Warna Hijau WA */
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            transition: background-color 0.3s ease;
        }

        .wa-button:hover {
            background-color: #128C7E; /* Warna lebih gelap saat hover */
        }

        .wa-button img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    
    <a href="https://chat.whatsapp.com/KdTdRrGbezhAAxKZ5fBhJ5?mode=gi_t" class="wa-button" target="_blank">
        <!-- Icon WhatsApp (Opsional, menggunakan emoji jika tidak ada file gambar) -->
        <span>💬</span> Gabung Grup Whatsapp
    </a>

</body>
</html>

        
        <div class="input-group">
            <label for="textInput">Masukkan teks untuk diubah menjadi gambar:</label>
            <input 
                type="text" 
                id="textInput" 
                placeholder="Contoh: Halo Dunia" 
                value="Halo Dunia"
                autocomplete="off"
            />
        </div>

        <button onclick="generateImage()" id="generateBtn">
            🚀 Generate
        </button>

        <!-- Elemen yang DILINGKARI MERAH - SEMUA DISEMBUNYIKAN -->
        <div class="url-info" id="urlDisplay" style="display: none;"></div>

        <div class="status" id="status">
            ⏳ Masukkan teks dan klik tombol generate
        </div>

        <div id="imageContainer" class="image-container loading" style="display: none;">
            <div class="loading-spinner"></div>
        </div>

        <div class="button-group" id="actionButtons" style="display: none;">
            <button class="download-btn" onclick="downloadImage()" id="downloadBtn">
                💾 Download Gambar
            </button>
            <button class="download-btn" onclick="openInNewTab()" id="openBtn">
                🔗 Buka di Tab Baru
            </button>
        </div>

        <div class="footer">
            ⚡ Klik Generate untuk membuat gambar Brat Anime
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
